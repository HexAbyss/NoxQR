    <text x="812" y="402" fill="#F7FBFF" font-size="28" font-family="Outfit, Arial, sans-serif" font-weight="700">Tablet Compact</text>
    <text x="812" y="432" fill="#93A6BA" font-size="15" font-family="Manrope, Arial, sans-serif" font-weight="700">561px to 720px</text>
