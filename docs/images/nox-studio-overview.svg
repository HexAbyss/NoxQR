    <rect x="494" y="546" width="98" height="24" rx="12" fill="#152028" stroke="#23313D"/>
    <rect x="602" y="546" width="98" height="24" rx="12" fill="#152028" stroke="#23313D"/>
    <rect x="498" y="550" width="44" height="16" rx="8" fill="#00FFAA"/>
