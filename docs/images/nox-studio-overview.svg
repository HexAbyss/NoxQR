<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#050A0F"/>
  <g opacity="0.9" filter="url(#blur)">
    <circle cx="180" cy="162" r="172" fill="#00EAC4" fill-opacity="0.16"/>
    <circle cx="1420" cy="184" r="212" fill="#8758FF" fill-opacity="0.16"/>
    <circle cx="1110" cy="826" r="250" fill="#00BFFF" fill-opacity="0.12"/>
  </g>
  <rect x="48" y="48" width="1504" height="884" rx="40" fill="url(#surface)" stroke="#1B2632"/>

  <text x="100" y="134" fill="#00FFAA" font-size="17" font-family="Manrope, Arial, sans-serif" font-weight="800" letter-spacing="4">RESPONSIVE SURFACE MAP</text>
  <text x="100" y="214" fill="#F7FBFF" font-size="68" font-family="Outfit, Arial, sans-serif" font-weight="800" letter-spacing="-3">One product surface, four viewport behaviors.</text>
  <text x="100" y="272" fill="#C3D0DE" font-size="26" font-family="Manrope, Arial, sans-serif" font-weight="500">Desktop keeps the hero balanced. Tablet ranges progressively compress the mark, copy, and toggles.</text>
  <text x="100" y="308" fill="#C3D0DE" font-size="26" font-family="Manrope, Arial, sans-serif" font-weight="500">Mobile reduces the header to three clean rows while the rest of the studio remains legible.</text>

  <g>
    <rect x="100" y="360" width="320" height="384" rx="30" fill="#0E151C" stroke="#1F2C37"/>
    <text x="132" y="402" fill="#F7FBFF" font-size="28" font-family="Outfit, Arial, sans-serif" font-weight="700">Desktop</text>
    <text x="132" y="432" fill="#93A6BA" font-size="15" font-family="Manrope, Arial, sans-serif" font-weight="700">≥ 1121px</text>
    <rect x="132" y="462" width="256" height="108" rx="24" fill="#101920" stroke="#22313D"/>
    <rect x="154" y="486" width="38" height="38" rx="12" fill="#0D131A" stroke="#22313D"/>
    <g transform="translate(160 491) scale(0.12)">
      <path d="M36 204L86 54L130 198L222 48" stroke="#F7FBFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M134 54L220 132" stroke="#F7FBFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="204" y="503" fill="#F7FBFF" font-size="27" font-family="Outfit, Arial, sans-serif" font-weight="800">NOX</text>
    <rect x="300" y="478" width="66" height="26" rx="13" fill="#152028" stroke="#23313D"/>
    <rect x="300" y="512" width="66" height="26" rx="13" fill="#152028" stroke="#23313D"/>
    <rect x="304" y="482" width="30" height="18" rx="9" fill="#00FFAA"/>
    <rect x="304" y="516" width="30" height="18" rx="9" fill="#9392FF"/>
    <text x="132" y="616" fill="#C3D0DE" font-size="18" font-family="Manrope, Arial, sans-serif" font-weight="600">Brand and controls coexist on a single row.</text>
    <rect x="132" y="648" width="84" height="24" rx="12" fill="#101820" stroke="#22313D"/>
    <text x="155" y="664" fill="#C6D4E3" font-size="12" font-family="Manrope, Arial, sans-serif" font-weight="700">Dark</text>
