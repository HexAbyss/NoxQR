    <text x="1058" y="845" fill="#DDE8F4" font-size="14" font-family="Manrope, Arial, sans-serif" font-weight="700">Dark / Light themes</text>
    <rect x="1232" y="824" width="176" height="32" rx="16" fill="#111B23" stroke="#223340"/>
    <text x="1274" y="845" fill="#DDE8F4" font-size="14" font-family="Manrope, Arial, sans-serif" font-weight="700">Rust engine core</text>
