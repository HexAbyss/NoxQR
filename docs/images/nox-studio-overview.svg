    <text x="1224" y="503" fill="#F7FBFF" font-size="27" font-family="Outfit, Arial, sans-serif" font-weight="800">NOX</text>
    <rect x="1174" y="548" width="98" height="24" rx="12" fill="#152028" stroke="#23313D"/>
    <rect x="1178" y="552" width="44" height="16" rx="8" fill="#00FFAA"/>
    <rect x="1174" y="584" width="98" height="24" rx="12" fill="#152028" stroke="#23313D"/>
    <rect x="1178" y="588" width="44" height="16" rx="8" fill="#9392FF"/>
    <text x="1152" y="676" fill="#C3D0DE" font-size="18" font-family="Manrope, Arial, sans-serif" font-weight="600">Three clean rows: mark plus name, language toggle, then theme toggle.</text>
  </g>

  <g>
    <rect x="100" y="792" width="1340" height="96" rx="28" fill="#0E151C" stroke="#1F2C37"/>
    <rect x="128" y="824" width="186" height="32" rx="16" fill="#111B23" stroke="#223340"/>
    <text x="165" y="845" fill="#DDE8F4" font-size="14" font-family="Manrope, Arial, sans-serif" font-weight="700">Transparent background</text>
    <rect x="336" y="824" width="126" height="32" rx="16" fill="#111B23" stroke="#223340"/>
