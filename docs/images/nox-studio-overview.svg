    <text x="966" y="508" fill="#617486" font-size="11" font-family="Manrope, Arial, sans-serif" font-weight="700">summary</text>
    <rect x="834" y="548" width="98" height="24" rx="12" fill="#EEF4F8" stroke="#D7E1EB"/>
    <rect x="942" y="548" width="98" height="24" rx="12" fill="#EEF4F8" stroke="#D7E1EB"/>
